<div class="image-upload-container">
  <h2>Upload Timesheet Images</h2>
  <p class="instruction">Upload your timesheet image(s)</p>
  
  <!-- Upload Mode Selector -->
  <div class="mode-selector">
    <label class="radio-option">
      <input type="radio" name="uploadMode" value="dual" [(ngModel)]="uploadMode" (change)="onModeChange()">
      <span>Two separate images (front & back)</span>
    </label>
    <label class="radio-option">
      <input type="radio" name="uploadMode" value="single" [(ngModel)]="uploadMode" (change)="onModeChange()">
      <span>Single scan with both sides</span>
    </label>
  </div>

  <!-- Single Image Upload Mode -->
  <div *ngIf="uploadMode === 'single'" class="single-upload">
    <div class="upload-section full-width">
      <h3>Combined Front & Back Scan</h3>
      <div class="upload-area"
          [class.drag-over]="dragOver"
          (drop)="onDrop($event, 'single')"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)">
        
        <div *ngIf="!combinedImage" class="upload-prompt">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>Drop combined scan here or</p>
          <label class="file-label">
            <input type="file" 
                  accept="image/jpeg,image/jpg,image/png,image/webp,image/heic,application/pdf" 
                  (change)="onFileSelected($event, 'single')">
            <span class="file-button">Choose File</span>
          </label>
        </div>
        
        <div *ngIf="combinedImage" class="image-preview">
          <img [src]="combinedImage" alt="Combined timesheet">
          <button class="remove-btn" (click)="combinedImage = null; showConfirmButton = false">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dual Image Upload Mode -->
  <div *ngIf="uploadMode === 'dual'" class="upload-row">
    <!-- Front Image Upload -->
    <div class="upload-section">
      <h3>Front Side</h3>
      <div class="upload-area"
          [class.drag-over]="dragOver"
          (drop)="onDrop($event, 'front')"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)">
        
        <div *ngIf="!frontImage" class="upload-prompt">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>Drop front image here or</p>
          <label class="file-label">
            <input type="file" 
                  accept="image/jpeg,image/jpg,image/png,image/webp,image/heic,application/pdf" 
                  (change)="onFileSelected($event, 'front')">
            <span class="file-button">Choose File</span>
          </label>
        </div>
        
        <div *ngIf="frontImage" class="image-preview">
          <img [src]="frontImage" alt="Front timesheet">
          <button class="remove-btn" (click)="frontImage = null">✕</button>
        </div>
      </div>
    </div>

    <!-- Back Image Upload -->
    <div class="upload-section">
      <h3>Back Side</h3>
      <div class="upload-area"
          [class.drag-over]="dragOver"
          (drop)="onDrop($event, 'back')"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)">
        
        <div *ngIf="!backImage" class="upload-prompt">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <p>Drop back image here or</p>
          <label class="file-label">
            <input type="file" 
                  accept="image/jpeg,image/jpg,image/png,image/webp,image/heic,application/pdf" 
                  (change)="onFileSelected($event, 'back')">
            <span class="file-button">Choose File</span>
          </label>
        </div>
        
        <div *ngIf="backImage" class="image-preview">
          <img [src]="backImage" alt="Back timesheet">
          <button class="remove-btn" (click)="backImage = null">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-area" *ngIf="showConfirmButton">
    <div class="status-message">
      <span class="check-icon">✓</span>
      Both images uploaded successfully!
    </div>
    <div class="button-group">
      <button class="btn btn-secondary" (click)="clearImages()">Clear Images</button>
      <button class="btn btn-primary" (click)="confirmImages()">Confirm & Start Processing</button>
    </div>
  </div>
</div>
